services:
  traefik:
    image: traefik:v3.7
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      # No port published for the `traefik` entrypoint (dashboard/api/
      # metrics, :8080 internally) - admin-only, same posture Caddy's :2019
      # had: reachable from other containers on tamga-network, not the host.
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - traefik_acme:/data
    networks:
      - tamga-network
      # No static "tamga-net" membership here (that flat, project-shared
      # network is gone - FEAT-028 closed BUG-029 by giving every project
      # its own "project-net-<id>" instead, see project_service.go's
      # deployStack). Traefik reaches each project's exposed service by
      # being dynamically ConnectNetworks'd onto that one project's network
      # at deploy time (and re-attached on backend restart by
      # ProjectService.ReconcileRoutes) - not declared statically here,
      # since the set of project networks isn't known at compose-up time.

  backend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.backend
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/data
      # Read-write: the backend writes per-project route files here
      # (FEAT-024). Same host directory Traefik's file provider watches.
      - ./traefik/dynamic:/etc/traefik/dynamic
      - .:/tamga-src:ro
    env_file: .env
    environment:
      - HOST_DATA_DIR=${PWD}/data
      - SYSTEM_CODE_DIR=/tamga-src
    networks:
      - tamga-network

  frontend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.frontend
    restart: unless-stopped
    networks:
      - tamga-network

  agent:
    build:
      context: .
      dockerfile: deploy/Dockerfile.agent
    image: tamga-agent
    profiles:
      - build-only

  egress-proxy:
    build:
      context: .
      dockerfile: deploy/Dockerfile.egress-proxy
    image: tamga-egress-proxy
    profiles:
      - build-only

volumes:
  traefik_acme:

networks:
  tamga-network:
    # Not internal: Traefik needs outbound access for Let's Encrypt, and the
    # backend needs it for git clone/pull. Egress isolation belongs on the
    # separate agent-sandbox network (see FEAT-006), not here.
    driver: bridge
  # No "tamga-net" here anymore: FEAT-028 replaced the single shared,
  # unparameterized project network (BUG-029) with one "project-net-<id>"
  # network per project, created on demand by ProjectService.deployStack's
  # EnsureNetwork call - there's no fixed set of these to pre-declare in
  # compose, and Traefik joins each one dynamically via ConnectNetworks
  # rather than a static compose network membership (see the traefik
  # service's comment above).
