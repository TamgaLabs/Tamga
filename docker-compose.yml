services:
  api:
    build:
      context: .
    expose:
      - "8080"
    environment:
      DATABASE_URL: postgres://tamga:tamga@postgres:5432/tamga?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-super-secret-key-change-in-production}
      PORT: "8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.services.api.loadbalancer.server.port=8080"

  frontend:
    build:
      context: ./frontend
    expose:
      - "3000"
    environment:
      NODE_ENV: production
    depends_on:
      - api
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tamga
      POSTGRES_PASSWORD: tamga
      POSTGRES_DB: tamga
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tamga"]
      interval: 5s
      timeout: 5s
      retries: 5

  traefik:
    image: traefik:latest
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOCKER_API_VERSION: "1.40"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - traefik_data:/etc/traefik/acme
    command:
      - "--api.dashboard=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=admin@example.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/etc/traefik/acme/acme.json"

volumes:
  postgres_data:
  traefik_data:
